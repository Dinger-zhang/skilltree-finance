cases:
  - id: b1_hidden_boundary_01
    node_id: income_statement_boundary
    case: 一家咖啡店本月向顾客出售咖啡，同时从银行借入一笔一年期贷款。
    question: 哪一项更可能进入利润表作为经营成果？请说明为什么贷款不是营业收入。
    expected_reasoning_points:
      - 利润表记录一段期间的经营成果
      - 销售商品或服务形成收入或费用边界内的交易
      - 银行借款是筹资活动不是营业收入
    misconception_traps:
      - 把所有现金流入都当作收入
      - 把借款当作利润表收入

  - id: b2_hidden_revenue_recognition_01
    node_id: revenue_recognition
    case: 设计公司本月完成并交付一套海报，客户约定下月付款。
    question: 本月是否可能确认收入？回答时区分“完成服务”和“收到现金”。
    expected_reasoning_points:
      - 收入来自销售商品或提供服务
      - 完成交付或服务后可能满足收入确认条件
      - 收入确认不一定依赖现金已经到账
    misconception_traps:
      - 没收到现金就一定不能确认收入
      - 把收款作为收入确认的唯一条件

  - id: b3_hidden_revenue_cash_01
    node_id: revenue_not_cash_receipt
    case: 批发商本月赊销 8000 元商品，客户 45 天后付款。
    question: 本月利润表和现金分别可能怎样变化？请说明收入为什么不等于收款。
    expected_reasoning_points:
      - 赊销可能先确认收入
      - 未收现金时现金不一定增加
      - 可能形成应收账款而不是现金流入
    misconception_traps:
      - 收入增加就等于现金增加
      - 赊销没有收到钱所以没有任何经营成果

  - id: b4_hidden_expense_recognition_01
    node_id: expense_recognition
    case: 门店员工已经完成本月工作，工资约定下月发放。
    question: 本月是否可能确认工资费用？请区分费用发生和现金付款。
    expected_reasoning_points:
      - 费用是为取得收入或维持经营发生的耗费
      - 费用发生不一定等于当期已经付款
      - 工资费用会减少本期利润
    misconception_traps:
      - 没付款就没有费用
      - 只看现金流出不看费用归属期间

  - id: b5_hidden_depreciation_01
    node_id: depreciation_amortization
    case: 面包店去年一次性买入烤箱，今年继续使用并按月计提折旧。
    question: 今年的折旧为什么会影响利润，但通常不代表今年再次付现金？
    expected_reasoning_points:
      - 折旧是长期资产成本在多个期间的分摊
      - 折旧费用会减少当期利润
      - 折旧通常不是当期现金流出
    misconception_traps:
      - 折旧就是每月重新付款
      - 折旧不影响利润表

  - id: b6_hidden_gross_margin_01
    node_id: gross_margin
    case: 服装店销售收入 10000 元，对应售出衣服的进货成本 6500 元。
    question: 如何推出毛利和毛利率？它们还没有扣除哪些费用？
    expected_reasoning_points:
      - 毛利等于收入减销售成本
      - 毛利率等于毛利除以收入
      - 毛利还没有扣除销售管理研发财务等期间费用
    misconception_traps:
      - 毛利率就是净利率
      - 毛利高就一定净利润高

  - id: b7_hidden_net_profit_01
    node_id: net_profit
    case: 公司收入 50000 元，销售成本 30000 元，期间费用 12000 元，暂不考虑税费。
    question: 如何推出净利润？为什么净利润为正仍不必然表示现金充足？
    expected_reasoning_points:
      - 净利润大致等于收入扣除成本费用和税费
      - 本例净利润为 8000 元
      - 净利润可能包含未收现收入或非现金费用所以不等于现金
    misconception_traps:
      - 收入高就一定利润高
      - 净利润为正就一定现金充足

  - id: b8_hidden_accrual_cash_01
    node_id: accrual_vs_cash
    case: 咨询公司 6 月完成服务，7 月收款；6 月发生房租但 7 月付款。
    question: 权责发生制下 6 月应如何看收入和费用？它和现金制的关注点有什么不同？
    expected_reasoning_points:
      - 权责发生制关注交易归属期间
      - 满足条件时未收款也可能确认 6 月收入
      - 已发生费用即使未付款也可能归入 6 月
      - 现金制关注现金实际收付时间
    misconception_traps:
      - 权责发生制只看现金是否到账
      - 未付款就没有费用
