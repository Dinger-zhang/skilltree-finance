pretest:
  - id: pre_01
    type: single_choice
    score: 1
    node_id: financial_statement_overview
    question: 财务报表三件套通常包括哪三张表？
    options:
      A: 资产负债表、利润表、现金流量表
      B: 预算表、采购表、工资表
      C: 订单表、客户表、库存表
      D: 项目表、日报表、审批表
    answer: A
    explanation: 基础财务报表通常指资产负债表、利润表和现金流量表。

  - id: pre_02
    type: single_choice
    score: 1
    node_id: accounting_equation
    question: 会计恒等式正确的是哪一个？
    options:
      A: 资产 = 收入 - 费用
      B: 资产 = 负债 + 所有者权益
      C: 利润 = 资产 + 负债
      D: 现金 = 收入 + 成本
    answer: B
    explanation: 资产负债表的核心关系是资产等于负债加所有者权益。

  - id: pre_03
    type: multiple_choice
    score: 2
    node_id: balance_sheet_assets
    question: 下列哪些项目通常属于资产？（多选）
    options:
      A: 银行短期借款
      B: 应收账款
      C: 机器设备
      D: 货币资金
    answer:
      - B
      - C
      - D
    explanation: 应收账款、机器设备和货币资金通常属于资产；银行短期借款属于负债。

  - id: pre_04
    type: single_choice
    score: 1
    node_id: balance_sheet_liabilities_equity
    question: 企业向银行借入一笔贷款，通常会形成什么？
    options:
      A: 负债
      B: 收入
      C: 费用
      D: 存货
    answer: A
    explanation: 借款代表企业未来需要偿还的义务，通常属于负债。

  - id: pre_05
    type: single_choice
    score: 1
    node_id: income_statement_revenue
    question: 利润表的起点通常是什么？
    options:
      A: 现金余额
      B: 销售收入
      C: 银行贷款
      D: 固定资产
    answer: B
    explanation: 利润表通常从收入开始，再扣除成本、费用和税费等。

  - id: pre_06
    type: single_choice
    score: 1
    node_id: net_profit
    question: 收入 100，费用 75，不考虑税费时净利润是多少？
    options:
      A: 25
      B: 75
      C: 100
      D: 175
    answer: A
    explanation: 净利润可以简单理解为收入减费用，所以是 25。

  - id: pre_07
    type: multiple_choice
    score: 2
    node_id: cash_flow_overview
    question: 现金流量表通常包括哪些活动分类？（多选）
    options:
      A: 经营活动
      B: 投资活动
      C: 筹资活动
      D: 考勤活动
    answer:
      - A
      - B
      - C
    explanation: 现金流量表通常分为经营、投资和筹资三类活动。

  - id: pre_08
    type: short_answer
    score: 2
    node_id: accrual_vs_cash
    question: 请用自己的话解释：为什么利润和现金流可能不同？
    answer: 权责发生制下收入费用确认时间可能与现金收付时间不同，应收账款、存货和折旧等都会造成利润与现金流差异。
    explanation: 本题为简答题，第一版先保存答案，后续由教师人工评分。

  - id: pre_09
    type: single_choice
    score: 1
    node_id: current_ratio
    question: 流动比率的常见计算公式是什么？
    options:
      A: 流动资产 / 流动负债
      B: 总负债 / 总资产
      C: 净利润 / 收入
      D: 毛利 / 存货
    answer: A
    explanation: 流动比率用于观察短期偿债能力，公式是流动资产除以流动负债。

  - id: pre_10
    type: short_answer
    score: 2
    node_id: roe
    question: ROE 通常用来观察什么？请简要说明。
    answer: ROE 通常用来观察股东或所有者权益的回报水平，反映净利润相对于所有者权益的比例。
    explanation: 本题为简答题，第一版先保存答案，后续由教师人工评分。

posttest:
  - id: post_01
    type: single_choice
    score: 1
    node_id: financial_statement_overview
    question: 如果想快速判断企业“某一天有什么、欠什么”，应该优先看哪张表？
    options:
      A: 利润表
      B: 资产负债表
      C: 现金流量表
      D: 销售订单表
    answer: B
    explanation: 资产负债表展示企业某一时点的资产、负债和所有者权益。

  - id: post_02
    type: single_choice
    score: 1
    node_id: accounting_equation
    question: 企业资产 180 万，所有者权益 70 万，负债是多少？
    options:
      A: 70 万
      B: 110 万
      C: 180 万
      D: 250 万
    answer: B
    explanation: 根据资产 = 负债 + 所有者权益，负债 = 180 - 70 = 110 万。

  - id: post_03
    type: multiple_choice
    score: 2
    node_id: balance_sheet_assets
    question: 下列哪些项目通常属于企业资产？（多选）
    options:
      A: 仓库里的商品存货
      B: 客户尚未支付的货款
      C: 银行贷款
      D: 办公电脑
    answer:
      - A
      - B
      - D
    explanation: 存货、应收账款和办公电脑通常属于资产；银行贷款属于负债。

  - id: post_04
    type: single_choice
    score: 1
    node_id: balance_sheet_liabilities_equity
    question: 下列哪一项更可能属于负债？
    options:
      A: 货币资金
      B: 应收账款
      C: 应付供应商货款
      D: 固定资产
    answer: C
    explanation: 应付供应商货款代表未来需要偿付的义务，通常属于负债。

  - id: post_05
    type: single_choice
    score: 1
    node_id: income_statement_revenue
    question: 关于收入，下列说法更准确的是哪一个？
    options:
      A: 收入一定等于已经收到现金
      B: 收入通常来自销售商品或提供服务
      C: 银行借款一定是营业收入
      D: 收入只在年末确认
    answer: B
    explanation: 收入通常来自销售商品或提供服务，但收入确认不一定等于现金已经收到。

  - id: post_06
    type: single_choice
    score: 1
    node_id: net_profit
    question: 收入 300，成本和费用合计 240，不考虑税费时净利润是多少？
    options:
      A: 40
      B: 60
      C: 240
      D: 300
    answer: B
    explanation: 净利润 = 300 - 240 = 60。

  - id: post_07
    type: multiple_choice
    score: 2
    node_id: cash_flow_overview
    question: 下列哪些通常属于现金流量表关注的问题？（多选）
    options:
      A: 现金从哪里来
      B: 现金流向哪里
      C: 企业是否有实际现金流入流出
      D: 员工考勤是否完整
    answer:
      - A
      - B
      - C
    explanation: 现金流量表解释现金来源、去向和变化，不记录员工考勤。

  - id: post_08
    type: short_answer
    score: 2
    node_id: accrual_vs_cash
    question: 请举一个例子说明：为什么企业有利润但现金可能紧张？
    answer: 例如企业确认销售收入但客户尚未付款，应收账款增加，利润为正但现金没有同步流入，因此现金可能紧张。
    explanation: 本题为简答题，第一版先保存答案，后续由教师人工评分。

  - id: post_09
    type: single_choice
    score: 1
    node_id: current_ratio
    question: 流动资产 240，流动负债 120，流动比率是多少？
    options:
      A: 0.5
      B: 1.0
      C: 2.0
      D: 3.0
    answer: C
    explanation: 流动比率 = 流动资产 / 流动负债 = 240 / 120 = 2.0。

  - id: post_10
    type: short_answer
    score: 2
    node_id: roe
    question: 如果一家公司 ROE 较高，为什么还需要继续看负债和现金流？
    answer: ROE 较高可能来自较高杠杆或短期利润，仍需结合资产负债率和现金流判断回报质量和风险。
    explanation: 本题为简答题，第一版先保存答案，后续由教师人工评分。
